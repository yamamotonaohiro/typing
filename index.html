<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>タッチタイピングの練習</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #fdfdfd; color: #333; margin: 0; min-height: 100vh; padding: 10px; box-sizing: border-box; }
        #container { text-align: center; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 720px; position: relative; margin-bottom: 30px; z-index: 10; }
        
        #title-display { font-size: 1.8rem; font-weight: bold; margin-bottom: 15px; color: #7f8c8d; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        
        #question-box {
            background: #fafafa;
            border: 2px solid #eaeeef;
            border-radius: 15px;
            padding: 20px;
            margin: 15px 0;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        #sub-display { font-size: 2.8rem; font-weight: bold; margin-bottom: 10px; color: #2c3e50; transition: all 0.2s; }
        #roma-display { font-size: 2rem; letter-spacing: 0.15em; color: #bdc3c7; min-height: 1.2em; text-transform: lowercase; }
        
        #course-select { margin-top: 10px; display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
        .course-btn { background: #3498db; color: white; border: none; padding: 10px 20px; border-radius: 8px; font-size: 1rem; cursor: pointer; transition: background 0.2s; font-weight: bold; }
        .course-btn:hover { background: #2980b9; }

        #status-area { display: flex; align-items: center; justify-content: center; gap: 20px; margin-top: 20px; }
        #score-board { font-weight: bold; color: #7f8c8d; font-size: 1.2rem; }
        #audio-toggle { background: #ffffff; border: 2px solid #e67e22; border-radius: 50px; padding: 6px 18px; cursor: pointer; font-size: 0.9rem; color: #e67e22; font-weight: bold; }

        #ok-badge { position: absolute; top: 105%; left: 50%; transform: translateX(-50%) scale(0); font-size: 3.5rem; font-weight: bold; color: #27ae60; background: white; padding: 10px 50px; border-radius: 100px; border: 6px solid #27ae60; z-index: 100; transition: transform 0.2s, opacity 0.2s; pointer-events: none; box-shadow: 0 5px 20px rgba(0,0,0,0.1); opacity: 0; }
        #ok-badge.show { transform: translateX(-50%) scale(1.1); opacity: 1; }

        #keyboard-area { width: 920px; background: #d1d4d9; padding: 30px 0; border-radius: 12px; display: flex; flex-direction: column; align-items: center; position: relative; }
        .keyboard-row { display: flex; justify-content: center; width: 100%; margin-bottom: 8px; }
        .hand-gap { width: 80px; } 
        .row-1 { transform: translateX(-15px); }
        .row-2 { transform: translateX(10px); }
        .row-3 { transform: translateX(35px); }

        .key-btn { border: 2px solid rgba(0,0,0,0.05); border-radius: 6px; width: 55px; height: 55px; margin: 0 3px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; font-weight: bold; color: #444; position: relative; flex-shrink: 0; box-sizing: border-box; }
        .home-pos { border: 3px solid #555 !important; text-decoration: underline; text-decoration-thickness: 3px; text-underline-offset: 4px; color: #000; }

        .pinky { background-color: #ffcceb; box-shadow: 0 3px 0 #ff79c6; }
        .ring { background-color: #d1f7ff; box-shadow: 0 3px 0 #8be9fd; }
        .middle { background-color: #d4fee0; box-shadow: 0 3px 0 #50fa7b; }
        .index { background-color: #ffebd1; box-shadow: 0 3px 0 #ffb86c; }
        .highlight-key { background-color: #444 !important; color: white !important; transform: scale(1.05); border-color: #000 !important; }

        #finger-navigator { display: flex; justify-content: center; margin-top: 20px; padding: 10px 0 0 0; background: rgba(255,255,255,0.25); border-radius: 15px; align-items: flex-end; width: fit-content; transform: translateX(8px); }
        .nav-group { display: flex; width: 305px; }
        .dot-container { width: 61px; display: flex; flex-direction: column; justify-content: flex-start; align-items: center; position: relative; height: 95px; }
        .finger-shape { position: absolute; bottom: 0; width: 42px; background: rgba(0, 0, 0, 0.08); border-radius: 20px 20px 5px 5px; z-index: 1; }
        .f-pinky { height: 55px; } .f-ring { height: 72px; } .f-middle { height: 85px; } .f-index { height: 75px; } .f-thumb { height: 45px; } 
        .finger-dot { width: 18px; height: 18px; border-radius: 50%; transition: all 0.15s ease-out; border: 2px solid rgba(0,0,0,0.1); margin-top: 5px; z-index: 2; position: relative; opacity: 0.7; }
        #dot-L5, #dot-R5 { top: 40px; background-color: #ff79c6; } 
        #dot-L4, #dot-R4 { top: 28px; background-color: #8be9fd; } 
        #dot-L3, #dot-R3 { top: 10px; background-color: #50fa7b; } 
        #dot-L2, #dot-R2 { top: 20px; background-color: #ffb86c; } 
        .finger-dot.active { transform: scale(2.4); opacity: 1; border-color: rgba(255,255,255,0.9); box-shadow: 0 0 15px rgba(0,0,0,0.3); }
        .hand-separator { width: 85px; } 
        #hidden-input { position: absolute; opacity: 0; pointer-events: none; left: -9999px; }
    </style>
</head>
<body onclick="focusInput()">

    <div id="container">
        <div id="ok-badge">OK!</div>
        <div id="title-display">タッチタイピングの練習</div>
        
        <div id="question-box">
            <div id="sub-display">コースを選んでスタート</div>
            <div id="roma-display"></div>
        </div>
        
        <div id="course-select">
            <button class="course-btn" onclick="selectCourse(0)">２年１組</button>
            <button class="course-btn" onclick="selectCourse(1)">都道府県</button>
        </div>

        <div id="status-area">
            <div id="score-board">SCORE: <span id="score">0</span></div>
            <button id="audio-toggle" onclick="toggleAudio()">
                <span>読み上げ: <span id="audio-text">ON</span></span>
            </button>
        </div>
    </div>

    <div id="keyboard-area">
        <div id="virtual-keyboard">
            <div class="keyboard-row row-1">
                <div class="key-btn pinky" data-key="q">Q</div><div class="key-btn ring" data-key="w">W</div><div class="key-btn middle" data-key="e">E</div><div class="key-btn index" data-key="r">R</div><div class="key-btn index" data-key="t">T</div>
                <div class="hand-gap"></div>
                <div class="key-btn index" data-key="y">Y</div><div class="key-btn index" data-key="u">U</div><div class="key-btn middle" data-key="i">I</div><div class="key-btn ring" data-key="o">O</div><div class="key-btn pinky" data-key="p">P</div>
            </div>
            <div class="keyboard-row row-2">
                <div class="key-btn pinky" data-key="a">A</div><div class="key-btn ring" data-key="s">S</div><div class="key-btn middle" data-key="d">D</div><div class="key-btn index home-pos" data-key="f">F</div><div class="key-btn index" data-key="g">G</div>
                <div class="hand-gap"></div>
                <div class="key-btn index" data-key="h">H</div><div class="key-btn index home-pos" data-key="j">J</div><div class="key-btn middle" data-key="k">K</div><div class="key-btn ring" data-key="l">L</div><div class="key-btn pinky" style="visibility:hidden"></div>
            </div>
            <div class="keyboard-row row-3">
                <div class="key-btn pinky" data-key="z">Z</div><div class="key-btn ring" data-key="x">X</div><div class="key-btn middle" data-key="c">C</div><div class="key-btn index" data-key="v">V</div><div class="key-btn index" data-key="b">B</div>
                <div class="hand-gap"></div>
                <div class="key-btn index" data-key="n">N</div><div class="key-btn index" data-key="m">M</div><div class="key-btn middle" style="visibility:hidden"></div><div class="key-btn ring" style="visibility:hidden"></div><div class="key-btn pinky" style="visibility:hidden"></div>
            </div>
        </div>

        <div id="finger-navigator">
            <div class="nav-group">
                <div class="dot-container"><div class="finger-dot" id="dot-L5"></div><div class="finger-shape f-pinky"></div></div>
                <div class="dot-container"><div class="finger-dot" id="dot-L4"></div><div class="finger-shape f-ring"></div></div>
                <div class="dot-container"><div class="finger-dot" id="dot-L3"></div><div class="finger-shape f-middle"></div></div>
                <div class="dot-container"><div class="finger-dot" id="dot-L2"></div><div class="finger-shape f-index"></div></div>
                <div class="dot-container"><div class="finger-shape f-thumb"></div></div> 
            </div>
            <div class="hand-separator"></div>
            <div class="nav-group">
                <div class="dot-container"><div class="finger-shape f-thumb"></div></div> 
                <div class="dot-container"><div class="finger-dot" id="dot-R2"></div><div class="finger-shape f-index"></div></div>
                <div class="dot-container"><div class="finger-dot" id="dot-R3"></div><div class="finger-shape f-middle"></div></div>
                <div class="dot-container"><div class="finger-dot" id="dot-R4"></div><div class="finger-shape f-ring"></div></div>
                <div class="dot-container"><div class="finger-dot" id="dot-R5"></div><div class="finger-shape f-pinky"></div></div>
            </div>
        </div>
    </div>

    <input type="text" id="hidden-input" autocomplete="off">

    <script>
        const rawData = [
            ["いしいみつき", "ほっかいどう"], ["おおむろほおり", "あおもり"], ["おかだつぐみ", "いわて"], ["かいだみら", "みやぎ"],
            ["ごはいよう", "あきた"], ["ささきたかまさ", "やまがた"], ["さだまさはるか", "ふくしま"], ["しゃへいじゅん", "いばらき"],
            ["しゅうかずまさ", "とちぎ"], ["じんしの", "ぐんま"], ["たかしまあらた", "さいたま"], ["たかはしかいせ", "ちば"],
            ["ちんいりん", "とうきょう"], ["つかもとあさ", "かながわ"], ["どましぇんこにこる", "にいがた"], ["なかたにはるか", "とやま"],
            ["はやししゅうご", "いしかわ"], ["ふるはしまな", "ふくい"], ["ほんじょうまいこ", "やまなし"], ["みずのえま", "ながの"],
            ["やまもとゆきの", "ぎふ"], ["ようしょうきんほう", "しずおか"], ["よしだめい", "あいち"], ["わかまつえいと", "みえ"],
            ["のろのりこ", "しが"]
        ];

        // 「じゅ」をjuにするなど、表示を最適化
        const kanaMap = {
            'あ':'a','い':'i','う':'u','え':'e','お':'o','か':'ka','き':'ki','く':'ku','け':'ke','こ':'ko',
            'さ':'sa','し':'si','す':'su','せ':'se','そ':'so','た':'ta','ち':'ti','つ':'tu','て':'te','と':'to',
            'な':'na','に':'ni','ぬ':'nu','ね':'ne','の':'no','は':'ha','ひ':'hi','ふ':'fu','へ':'he','ほ':'ho',
            'ま':'ma','み':'mi','む':'mu','め':'me','も':'mo','や':'ya','ゆ':'yu','よ':'yo','ら':'ra','り':'ri',
            'る':'ru','れ':'re','ろ':'ro','わ':'wa','を':'wo','が':'ga','ぎ':'gi','ぐ':'gu','げ':'ge','ご':'go',
            'ざ':'za','じ':'zi','ず':'zu','ぜ':'ze','ぞ':'zo','だ':'da','ぢ':'zi','づ':'zu','で':'de','ど':'do',
            'ば':'ba','び':'bi','ぶ':'bu','べ':'be','ぼ':'bo','ぱ':'pa','ぴ':'pi','ぷ':'pu','ぺ':'pe','ぽ':'po',
            'きゃ':'kya','きゅ':'kyu','きょ':'kyo','しゃ':'sya','しゅ':'syu','しょ':'syo','ちゃ':'tya','ちゅ':'tyu','ちょ':'tyo',
            'にゃ':'nya','にゅ':'nyu','にょ':'nyo','ひゃ':'hya','ひゅ':'hyu','ひょ':'hyo','みゃ':'mya','みゅ':'myu','みょ':'myo',
            'りゃ':'rya','りゅ':'ryu','りょ':'ryo','ぎゃ':'gya','ぎゅ':'gyu','ぎょ':'gyo','じゃ':'ja','じゅ':'ju','じょ':'jo',
            'びゃ':'bya','びゅ':'byu','びょ':'byo','ぴゃ':'pya','ぴゅ':'pyu','ぴょ':'pyo',
            'しぇ':'sye','じぇ':'zye','ちぇ':'tye','ふぇ':'he','ふぉ':'ho','てぃ':'ti','てゅ':'tyu','うぃ':'wi','うぇ':'we','ん':'n' 
        };

        function toRoma(kana) {
            let roma = "";
            for(let i=0; i<kana.length; i++) {
                let char = kana[i];
                let nextChar = kana[i+1] || "";
                if(char === 'っ') {
                    let nextRoma = toRoma(nextChar);
                    if(nextRoma) roma += nextRoma[0]; 
                    continue;
                }
                if(nextChar && kanaMap[char + nextChar]) {
                    roma += kanaMap[char + nextChar]; i++;
                } else if(kanaMap[char]) {
                    if(char === 'ん') {
                        if(nextChar && "あいうえおやゆよなぬねの".includes(nextChar)) roma += "nn";
                        else roma += "n";
                    } else { roma += kanaMap[char]; }
                } else { roma += char; }
            }
            return roma;
        }

        let isAudioEnabled = true, shuffledList = [], currentQ = null, charIndex = 0, score = 0, isStarted = false;
        const subDisplay = document.getElementById("sub-display"), romaElement = document.getElementById("roma-display"), scoreElement = document.getElementById("score"), inputElement = document.getElementById("hidden-input"), okBadge = document.getElementById("ok-badge");
        const fingerToDot = {'q':'L5','a':'L5','z':'L5','w':'L4','s':'L4','x':'L4','e':'L3','d':'L3','c':'L3','r':'L2','f':'L2','v':'L2','t':'L2','g':'L2','b':'L2','y':'R2','h':'R2','n':'R2','u':'R2','j':'R2','m':'R2','i':'R3','k':'R3','o':'R4','l':'R4','p':'R5'};

        function selectCourse(colIndex) {
            score = 0;
            scoreElement.innerText = score;
            shuffledList = rawData.map(d => ({ k: d[colIndex], r: toRoma(d[colIndex]) })).sort(() => Math.random() - 0.5);
            isStarted = true; 
            nextQuestion();
        }

        function nextQuestion() {
            if (shuffledList.length === 0) return alert("お疲れ様でした！");
            currentQ = shuffledList.pop(); charIndex = 0; updateDisplay();
            if (isAudioEnabled) {
                speechSynthesis.cancel();
                let uttr = new SpeechSynthesisUtterance(currentQ.k);
                uttr.lang = 'ja-JP'; speechSynthesis.speak(uttr);
            }
            inputElement.focus();
        }

        function updateDisplay() {
            subDisplay.innerText = currentQ.k;
            let html = "";
            for (let i = 0; i < currentQ.r.length; i++) {
                if (i < charIndex) html += `<span style="color:#dcdde1">${currentQ.r[i]}</span>`;
                else if (i === charIndex) html += `<span style="color:#e67e22; border-bottom:3px solid #e67e22">${currentQ.r[i]}</span>`;
                else html += `<span>${currentQ.r[i]}</span>`;
            }
            romaElement.innerHTML = html;
            updateVisualAids();
        }

        function updateVisualAids() {
            document.querySelectorAll('.key-btn').forEach(b => b.classList.remove('highlight-key'));
            document.querySelectorAll('.finger-dot').forEach(d => d.classList.remove('active'));
            if(!currentQ) return;
            const targetChar = currentQ.r[charIndex];
            const targetBtn = document.querySelector(`.key-btn[data-key="${targetChar}"]`);
            if (targetBtn) {
                targetBtn.classList.add('highlight-key');
                const activeDot = document.getElementById(`dot-${fingerToDot[targetChar]}`);
                if (activeDot) activeDot.classList.add('active');
            }
        }

        inputElement.addEventListener("input", () => {
            if (!isStarted) return;
            const typed = inputElement.value.toLowerCase();
            if (typed.length > 0) {
                const inputChar = typed[typed.length - 1];
                if (inputChar === currentQ.r[charIndex]) {
                    charIndex++; updateDisplay();
                    if (charIndex === currentQ.r.length) {
                        score++; scoreElement.innerText = score;
                        okBadge.classList.add("show");
                        setTimeout(() => { okBadge.classList.remove("show"); nextQuestion(); }, 600);
                    }
                }
            }
            inputElement.value = "";
        });

        function focusInput() { if (isStarted) inputElement.focus(); }
        function toggleAudio() { isAudioEnabled = !isAudioEnabled; document.getElementById("audio-text").innerText = isAudioEnabled ? "ON" : "OFF"; }
    </script>
</body>
</html>
