<!DOCTYPE html>
<html lang="ja">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <meta name="robots" content="noindex,nofollow">
    <title>タッチタイピング練習</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #fdfdfd; color: #333; margin: 0; min-height: 100vh; padding: 10px; box-sizing: border-box; }
        #container { text-align: center; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 700px; position: relative; margin-bottom: 10px; }
        #kana-display { font-size: 2.2rem; font-weight: bold; margin-bottom: 5px; color: #2c3e50; }
        #roma-display { font-size: 1.6rem; letter-spacing: 0.1em; color: #95a5a6; min-height: 1.2em; text-transform: lowercase; }
        #score-board { margin-top: 10px; font-weight: bold; color: #7f8c8d; }

        #keyboard-area {
            width: 820px; 
            background: #d1d4d9;
            padding: 30px 0;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #finger-navigator {
            display: flex;
            justify-content: center;
            margin-bottom: 25px;
            padding: 20px 0 0 0;
            background: rgba(255,255,255,0.25);
            border-radius: 15px;
            align-items: flex-end;
            width: fit-content;
        }
        .nav-group {
            display: flex;
            width: 305px; 
        }
        .dot-container {
            width: 61px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            position: relative;
            height: 95px;
        }
        
        .finger-shape {
            position: absolute;
            bottom: 0;
            width: 42px;
            background: rgba(0, 0, 0, 0.08);
            border-radius: 20px 20px 5px 5px;
            z-index: 1;
        }
        .f-pinky  { height: 55px; }
        .f-ring   { height: 72px; }
        .f-middle { height: 85px; }
        .f-index  { height: 75px; }
        .f-thumb  { height: 45px; } 

        .hand-separator { width: 90px; } 

        .finger-dot {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background-color: #f0f0f0;
            transition: all 0.15s ease-out;
            border: 2px solid #bbb;
            margin-top: 5px;
            z-index: 2;
            position: relative;
        }
        
        #dot-L5, #dot-R5 { top: 40px; } 
        #dot-L4, #dot-R4 { top: 23px; } 
        #dot-L3, #dot-R3 { top: 10px; } 
        #dot-L2, #dot-R2 { top: 20px; } 

        .finger-dot.active {
            transform: scale(2.4);
            border-color: rgba(255,255,255,0.9);
            box-shadow: 0 0 15px rgba(0,0,0,0.3);
        }

        .keyboard-row {
            display: flex;
            justify-content: center;
            width: 100%;
            margin-bottom: 8px;
            position: relative;
        }

        .row-1 { transform: translateX(-30px); }
        .row-2 { transform: translateX(0px); }
        .row-3 { transform: translateX(-15px); } 
        
        .hand-gap { width: 90px; flex-shrink: 0; }

        .key-btn { 
            border: none; 
            border-radius: 6px; 
            width: 55px; 
            height: 55px; 
            margin: 0 3px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 1.2rem; 
            font-weight: bold; 
            color: #444; 
            position: relative; 
            flex-shrink: 0;
        }

        /* 配色設定 */
        .pinky  { background-color: #ffcceb; box-shadow: 0 3px 0 #ff79c6; }
        .ring   { background-color: #d1f7ff; box-shadow: 0 3px 0 #8be9fd; }
        .middle { background-color: #d4fee0; box-shadow: 0 3px 0 #50fa7b; }
        .index  { background-color: #ffebd1; box-shadow: 0 3px 0 #ffb86c; }

        .home-pos { text-decoration: underline; text-underline-offset: 4px; text-decoration-thickness: 2px; }
        
        .highlight-key { 
            background-color: #444 !important; 
            color: white !important; 
            transform: scale(1.05); 
            box-shadow: 0 0 10px rgba(0,0,0,0.3) !important; 
        }

        #ok-badge { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); font-size: 3.5rem; font-weight: bold; color: #27ae60; background: rgba(255,255,255,0.95); padding: 15px 40px; border-radius: 100px; border: 8px solid #27ae60; z-index: 20; transition: transform 0.2s; pointer-events: none; }
        #ok-badge.show { transform: translate(-50%, -50%) scale(1); }
        #start-btn { background: #e67e22; color: white; border: none; padding: 15px 40px; border-radius: 50px; font-size: 1.3rem; font-weight: bold; cursor: pointer; margin-top: 15px; }
        #hidden-input { position: absolute; opacity: 0; pointer-events: none; left: -9999px; }
    </style>
</head>
<body onclick="focusInput()">

    <div id="container">
        <div id="ok-badge">OK!</div>
        <div id="kana-display">タッチタイピング練習</div>
        <div id="roma-display">STARTボタンを押してね</div>
        <div id="score-board">SCORE: <span id="score">0</span> / 23</div>
        <button id="start-btn" onclick="startGame()">START</button>
    </div>

    <div id="keyboard-area">
        <div id="finger-navigator">
            <div class="nav-group">
                <div class="dot-container"><div class="finger-shape f-pinky"></div><div class="finger-dot" id="dot-L5"></div></div>
                <div class="dot-container"><div class="finger-shape f-ring"></div><div class="finger-dot" id="dot-L4"></div></div>
                <div class="dot-container"><div class="finger-shape f-middle"></div><div class="finger-dot" id="dot-L3"></div></div>
                <div class="dot-container"><div class="finger-shape f-index"></div><div class="finger-dot" id="dot-L2"></div></div>
                <div class="dot-container"><div class="finger-shape f-thumb"></div></div> 
            </div>
            <div class="hand-separator"></div>
            <div class="nav-group">
                <div class="dot-container"><div class="finger-shape f-thumb"></div></div> 
                <div class="dot-container"><div class="finger-shape f-index"></div><div class="finger-dot" id="dot-R2"></div></div>
                <div class="dot-container"><div class="finger-shape f-middle"></div><div class="finger-dot" id="dot-R3"></div></div>
                <div class="dot-container"><div class="finger-shape f-ring"></div><div class="finger-dot" id="dot-R4"></div></div>
                <div class="dot-container"><div class="finger-shape f-pinky"></div><div class="finger-dot" id="dot-R5"></div></div>
            </div>
        </div>

        <div id="virtual-keyboard">
            <div class="keyboard-row row-1">
                <div class="key-btn pinky" data-key="q">Q</div>
                <div class="key-btn ring" data-key="w">W</div>
                <div class="key-btn middle" data-key="e">E</div>
                <div class="key-btn index" data-key="r">R</div>
                <div class="key-btn index" data-key="t">T</div>
                <div class="hand-gap"></div>
                <div class="key-btn index" data-key="y">Y</div>
                <div class="key-btn index" data-key="u">U</div>
                <div class="key-btn middle" data-key="i">I</div>
                <div class="key-btn ring" data-key="o">O</div>
                <div class="key-btn pinky" data-key="p">P</div>
            </div>
            <div class="keyboard-row row-2">
                <div class="key-btn pinky" data-key="a">A</div>
                <div class="key-btn ring" data-key="s">S</div>
                <div class="key-btn middle" data-key="d">D</div>
                <div class="key-btn index home-pos" data-key="f">F</div>
                <div class="key-btn index" data-key="g">G</div>
                <div class="hand-gap"></div>
                <div class="key-btn index" data-key="h">H</div>
                <div class="key-btn index home-pos" data-key="j">J</div>
                <div class="key-btn middle" data-key="k">K</div>
                <div class="key-btn ring" data-key="l">L</div>
                <div class="key-btn" style="visibility:hidden"></div>
            </div>
            <div class="keyboard-row row-3">
                <div class="key-btn pinky" data-key="z">Z</div>
                <div class="key-btn ring" data-key="x">X</div>
                <div class="key-btn middle" data-key="c">C</div>
                <div class="key-btn index" data-key="v">V</div>
                <div class="key-btn index" data-key="b">B</div>
                <div class="hand-gap"></div>
                <div class="key-btn index" data-key="n">N</div>
                <div class="key-btn index" data-key="m">M</div>
                <div class="key-btn" style="visibility:hidden"></div>
                <div class="key-btn" style="visibility:hidden"></div>
            </div>
        </div>
    </div>

    <input type="text" id="hidden-input" autocomplete="off">

    <script>
        // JS内のマッピングも修正
        const fingerToDot = {
            'q':'L5', 'a':'L5', 'z':'L5',
            'w':'L4', 's':'L4', 'x':'L4',
            'e':'L3', 'd':'L3', 'c':'L3',
            'r':'L2', 'f':'L2', 'v':'L2', 't':'L2', 'g':'L2', 'b':'L2',
            'y':'R2', 'h':'R2', 'n':'R2', 'u':'R2', 'j':'R2', 'm':'R2', // MをR2(右手人差指)に修正
            'i':'R3', 'k':'R3', 
            'o':'R4', 'l':'R4',
            'p':'R5'
        };
        const fingerColors = {
            'L5':'#ff79c6', 'R5':'#ff79c6',
            'L4':'#8be9fd', 'R4':'#8be9fd',
            'L3':'#50fa7b', 'R3':'#50fa7b',
            'L2':'#ffb86c', 'R2':'#ffb86c'
        };

        const originalQuestions = [
            { k: "ようしょうきんほう", r: "yousyoukinhou" }, { k: "じんしの", r: "jinshino" }, { k: "たかはしかいせ", r: "takahashikaise" },
            { k: "やまもとゆきの", r: "yamamotoyukino" }, { k: "ふるはしまな", r: "furuhasimana" }, { k: "はやししゅうご", r: "hayasisyuugo" },
            { k: "なかたにはるか", r: "nakataniharuka" }, { k: "おかだつぐみ", r: "okadatugumi" }, { k: "ささきたかまさ", r: "sasakitakamasa" },
            { k: "さだまさはるか", r: "sadamasaharuka" }, { k: "みずのえま", r: "mizunoema" }, { k: "おおむろほおり", r: "oomurohoori" },
            { k: "ごはいよう", r: "gohaiyou" }, { k: "しゃへいじゅん", r: "syaheijun" }, { k: "たかしまあらた", r: "takasimaarata" },
            { k: "ちんいりん", r: "tinirin" }, { k: "わかまつえいと", r: "wakamatueito" }, { k: "つかもとあさ", r: "tukamotoasa" },
            { k: "しゅうかずまさ", r: "syuukazumasa" }, { k: "よしだめい", r: "yosidamei" }, { k: "どましぇんこにこる", r: "domasyenkonikoru" },
            { k: "かいだみら", r: "kaidamira" }, { k: "いしいみつき", r: "isiimituki" }
        ];
        const finalizedQuestions = originalQuestions.map(q => {
            let roma = q.r.replace(/zi/g, "ji").replace(/zyu/g, "ju").replace(/hu/g, "fu").replace(/tsu/g, "tu").replace(/chi/g, "ti").replace(/shi/g, "si");
            return { k: q.k, r: roma };
        });

        let shuffledList = [], currentQ = null, charIndex = 0, score = 0, isStarted = false;
        const kanaElement = document.getElementById("kana-display"), romaElement = document.getElementById("roma-display"), scoreElement = document.getElementById("score"), inputElement = document.getElementById("hidden-input"), startBtn = document.getElementById("start-btn"), okBadge = document.getElementById("ok-badge");
        const keyButtons = document.querySelectorAll('.key-btn');
        const fingerDots = document.querySelectorAll('.finger-dot');

        function startGame() { isStarted = true; startBtn.style.display = "none"; inputElement.focus(); nextQuestion(); }
        function focusInput() { if (isStarted) inputElement.focus(); }
        function nextQuestion() {
            if (shuffledList.length === 0) shuffledList = [...finalizedQuestions].sort(() => Math.random() - 0.5);
            currentQ = shuffledList.pop();
            charIndex = 0;
            updateDisplay();
            if (window.speechSynthesis) {
                speechSynthesis.cancel();
                const uttr = new SpeechSynthesisUtterance(currentQ.k);
                uttr.lang = 'ja-JP';
                speechSynthesis.speak(uttr);
            }
        }

        function updateDisplay() {
            kanaElement.innerText = currentQ.k;
            let html = "";
            for (let i = 0; i < currentQ.r.length; i++) {
                if (i < charIndex) html += `<span style="color:#dcdde1">${currentQ.r[i]}</span>`;
                else if (i === charIndex) html += `<span style="color:#e67e22; border-bottom:3px solid #e67e22">${currentQ.r[i]}</span>`;
                else html += `<span>${currentQ.r[i]}</span>`;
            }
            romaElement.innerHTML = html;
            updateVisualAids();
        }

        function updateVisualAids() {
            keyButtons.forEach(btn => btn.classList.remove('highlight-key'));
            fingerDots.forEach(dot => { dot.classList.remove('active'); dot.style.backgroundColor = '#f0f0f0'; });
            if(!currentQ || charIndex >= currentQ.r.length) return;
            const targetChar = currentQ.r[charIndex];
            const targetBtn = document.querySelector(`.key-btn[data-key="${targetChar}"]`);
            if (targetBtn) {
                targetBtn.classList.add('highlight-key');
                const dotId = fingerToDot[targetChar];
                const activeDot = document.getElementById(`dot-${dotId}`);
                if (activeDot) { activeDot.classList.add('active'); activeDot.style.backgroundColor = fingerColors[dotId]; }
            }
        }

        inputElement.addEventListener("input", () => {
            if (!isStarted || okBadge.classList.contains("show")) { inputElement.value = ""; return; }
            const typed = inputElement.value.toLowerCase();
            const target = currentQ.r[charIndex];
            if (typed.includes(target)) {
                charIndex++;
                updateDisplay();
                if (charIndex === currentQ.r.length) {
                    score++; scoreElement.innerText = score;
                    okBadge.classList.add("show");
                    setTimeout(() => { okBadge.classList.remove("show"); nextQuestion(); }, 600);
                }
            }
            inputElement.value = "";
        });
    </script>
</body>
</html>
