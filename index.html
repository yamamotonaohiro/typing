<!DOCTYPE html>
<html lang="ja">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <meta name="robots" content="noindex,nofollow">
    <title>Classmate Typing - Split Layout</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #fdfdfd; color: #333; margin: 0; min-height: 100vh; padding: 20px; box-sizing: border-box; }
        #container { text-align: center; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 650px; position: relative; margin-bottom: 20px; }
        #kana-display { font-size: 2.2rem; font-weight: bold; margin-bottom: 10px; color: #2c3e50; }
        #roma-display { font-size: 1.6rem; letter-spacing: 0.1em; color: #95a5a6; min-height: 1.2em; text-transform: lowercase; }
        .correct { color: #dcdde1; }
        .cursor { color: #e67e22; border-bottom: 3px solid #e67e22; }
        
        #virtual-keyboard {
            background: #d1d4d9;
            padding: 15px;
            border-radius: 12px;
            width: 100%;
            max-width: 650px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            user-select: none;
            box-sizing: border-box;
        }
        .keyboard-row {
            display: flex;
            justify-content: flex-start;
            margin-bottom: 8px;
            width: 100%;
        }
        .key-btn {
            background: #ffffff;
            border: none;
            border-radius: 6px;
            flex: 1;
            max-width: 50px;
            height: 48px;
            margin: 0 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: bold;
            color: #444;
            box-shadow: 0 3px 0 #adb1b8;
            transition: all 0.05s;
        }

        /* 階段状のオフセット設定 */
        .row-1 { padding-left: 0px; }
        .row-2 { padding-left: 20px; }
        .row-3 { padding-left: 45px; }
        
        /* 左右を離すための隙間（スペーサー） */
        .hand-gap {
            width: 40px; /* 左右のグループの間の距離 */
            flex-shrink: 0;
        }

        .home-pos {
            text-decoration: underline;
            text-underline-offset: 4px;
            text-decoration-thickness: 2px;
        }

        .highlight-key {
            background-color: #e67e22 !important;
            color: white !important;
            box-shadow: 0 0 12px rgba(230,126,34,0.7) !important;
            transform: scale(1.05);
        }

        #ok-badge {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
            font-size: 4rem; font-weight: bold; color: #27ae60; background: rgba(255,255,255,0.9);
            padding: 15px 40px; border-radius: 100px; border: 8px solid #27ae60;
            z-index: 20; pointer-events: none; transition: transform 0.2s;
        }
        #ok-badge.show { transform: translate(-50%, -50%) scale(1); }
        #hidden-input { position: absolute; opacity: 0; pointer-events: none; }
        #start-btn { background: #e67e22; color: white; border: none; padding: 15px 40px; border-radius: 50px; font-size: 1.3rem; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .info { font-size: 0.75rem; color: #7f8c8d; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body onclick="focusInput()">

    <div id="container">
        <div id="ok-badge">OK!</div>
        <div id="kana-display">&#12479;&#12483;&#12503;&#12375;&#12390;&#38283;&#22987;</div>
        <div id="roma-display">tap to start</div>
        <div id="score-board">SCORE: <span id="score">0</span> / 23</div>
        <button id="start-btn" onclick="startGame()">START</button>
        <div class="info">JI / JU / FU / TU / TI / SI / SYE 固定</div>
    </div>

    <input type="text" id="hidden-input" autocomplete="off">

    <div id="virtual-keyboard">
        <div class="keyboard-row row-1">
            <div class="key-btn" data-key="q">Q</div>
            <div class="key-btn" data-key="w">W</div>
            <div class="key-btn" data-key="e">E</div>
            <div class="key-btn" data-key="r">R</div>
            <div class="key-btn" data-key="t">T</div>
            <div class="hand-gap"></div> <div class="key-btn" data-key="y">Y</div>
            <div class="key-btn" data-key="u">U</div>
            <div class="key-btn" data-key="i">I</div>
            <div class="key-btn" data-key="o">O</div>
            <div class="key-btn" data-key="p">P</div>
        </div>
        <div class="keyboard-row row-2">
            <div class="key-btn" data-key="a">A</div>
            <div class="key-btn" data-key="s">S</div>
            <div class="key-btn" data-key="d">D</div>
            <div class="key-btn home-pos" data-key="f">F</div>
            <div class="key-btn" data-key="g">G</div>
            <div class="hand-gap"></div> <div class="key-btn" data-key="h">H</div>
            <div class="key-btn home-pos" data-key="j">J</div>
            <div class="key-btn" data-key="k">K</div>
            <div class="key-btn" data-key="l">L</div>
        </div>
        <div class="keyboard-row row-3">
            <div class="key-btn" data-key="z">Z</div>
            <div class="key-btn" data-key="x">X</div>
            <div class="key-btn" data-key="c">C</div>
            <div class="key-btn" data-key="v">V</div>
            <div class="key-btn" data-key="b">B</div>
            <div class="hand-gap"></div> <div class="key-btn" data-key="n">N</div>
            <div class="key-btn" data-key="m">M</div>
        </div>
    </div>

    <script>
        // ロジック部分は変更なし
        const originalQuestions = [
            { k: "ようしょうきんほう", r: "yousyoukinhou" }, { k: "じんしの", r: "jinshino" }, { k: "たかはしかいせ", r: "takahashikaise" },
            { k: "やまもとゆきの", r: "yamamotoyukino" }, { k: "ふるはしまな", r: "furuhasimana" }, { k: "はやししゅうご", r: "hayasisyuugo" },
            { k: "なかたにはるか", r: "nakataniharuka" }, { k: "おかだつぐみ", r: "okadatugumi" }, { k: "ささきたかまさ", r: "sasakitakamasa" },
            { k: "さだまさはるか", r: "sadamasaharuka" }, { k: "みずのえま", r: "mizunoema" }, { k: "おおむろほおり", r: "oomurohoori" },
            { k: "ごはいよう", r: "gohaiyou" }, { k: "しゃへいじゅん", r: "syaheijun" }, { k: "たかしまあらた", r: "takasimaarata" },
            { k: "ちんいりん", r: "tinirin" }, { k: "わかまつえいと", r: "wakamatueito" }, { k: "つかもとあさ", r: "tukamotoasa" },
            { k: "しゅうかずまさ", r: "syuukazumasa" }, { k: "よしだめい", r: "yosidamei" }, { k: "どましぇんこにこる", r: "domasyenkonikoru" },
            { k: "かいだみら", r: "kaidamira" }, { k: "いしいみつき", r: "isiimituki" }
        ];

        const finalizedQuestions = originalQuestions.map(q => {
            let roma = q.r.replace(/zi/g, "ji").replace(/zyu/g, "ju").replace(/hu/g, "fu").replace(/tsu/g, "tu").replace(/chi/g, "ti").replace(/shi/g, "si");
            return { k: q.k, r: roma };
        });

        let shuffledList = [], currentQ = null, charIndex = 0, score = 0, isStarted = false;
        const kanaElement = document.getElementById("kana-display"), romaElement = document.getElementById("roma-display"), scoreElement = document.getElementById("score"), inputElement = document.getElementById("hidden-input"), startBtn = document.getElementById("start-btn"), okBadge = document.getElementById("ok-badge");
        const keyButtons = document.querySelectorAll('.key-btn');

        function shuffle(array) {
            let arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function speak(text) {
            if (!window.speechSynthesis) return;
            speechSynthesis.cancel();
            const uttr = new SpeechSynthesisUtterance(text);
            uttr.lang = 'ja-JP';
            speechSynthesis.speak(uttr);
        }

        function startGame() {
            isStarted = true;
            startBtn.style.display = "none";
            inputElement.focus();
            nextQuestion();
        }

        function focusInput() { if (isStarted) inputElement.focus(); }

        function nextQuestion() {
            if (shuffledList.length === 0) shuffledList = shuffle(finalizedQuestions);
            currentQ = shuffledList.pop();
            charIndex = 0;
            updateDisplay();
            speak(currentQ.k);
            inputElement.value = "";
        }

        function updateDisplay() {
            kanaElement.innerText = currentQ.k;
            let html = "";
            for (let i = 0; i < currentQ.r.length; i++) {
                if (i < charIndex) html += `<span class="correct">${currentQ.r[i]}</span>`;
                else if (i === charIndex) html += `<span class="cursor">${currentQ.r[i]}</span>`;
                else html += `<span>${currentQ.r[i]}</span>`;
            }
            romaElement.innerHTML = html;
            highlightKey();
        }

        function highlightKey() {
            keyButtons.forEach(btn => btn.classList.remove('highlight-key'));
            if (!currentQ) return;
            const targetChar = currentQ.r[charIndex];
            const targetBtn = document.querySelector(`.key-btn[data-key="${targetChar}"]`);
            if (targetBtn) targetBtn.classList.add('highlight-key');
        }

        function showOk() {
            okBadge.classList.add("show");
            setTimeout(() => {
                okBadge.classList.remove("show");
                nextQuestion();
            }, 600);
        }

        inputElement.addEventListener("input", (e) => {
            if (!isStarted || okBadge.classList.contains("show")) return;
            const val = inputElement.value.toLowerCase();
            const targetChar = currentQ.r[charIndex];
            if (val.endsWith(targetChar)) {
                charIndex++;
                if (charIndex === currentQ.r.length) {
                    score++;
                    scoreElement.innerText = score;
                    showOk();
                } else {
                    updateDisplay();
                }
            }
        });
    </script>
</body>
</html>
