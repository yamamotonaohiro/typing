<!DOCTYPE html>
<html lang="ja">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <meta name="robots" content="noindex,nofollow">
    <title>Classmate Typing - Corrected Display</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #fdfdfd; color: #333; margin: 0; min-height: 100vh; padding: 20px; box-sizing: border-box; overflow: hidden; }
        #container { text-align: center; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 500px; z-index: 10; position: relative; }
        #kana-display { font-size: 2rem; font-weight: bold; margin-bottom: 10px; color: #2c3e50; }
        #roma-display { font-size: 1.5rem; letter-spacing: 0.1em; color: #95a5a6; min-height: 1.2em; text-transform: lowercase; }
        .correct { color: #dcdde1; }
        .cursor { color: #e67e22; border-bottom: 3px solid #e67e22; }
        #score-board { margin-top: 20px; font-size: 1rem; color: #7f8c8d; }
        #ok-badge {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
            font-size: 5rem; font-weight: bold; color: #27ae60; background: rgba(255,255,255,0.9);
            padding: 20px 40px; border-radius: 100px; border: 8px solid #27ae60;
            z-index: 20; pointer-events: none; transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #ok-badge.show { transform: translate(-50%, -50%) scale(1); }
        #hidden-input { position: absolute; opacity: 0; pointer-events: none; }
        #start-btn { background: #e67e22; color: white; border: none; padding: 15px 30px; border-radius: 50px; font-size: 1.2rem; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .info { font-size: 0.75rem; color: #e74c3c; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body onclick="focusInput()">

    <div id="container">
        <div id="ok-badge">OK!</div>
        <div id="kana-display">&#12479;&#12483;&#12503;&#12375;&#12390;&#38283;&#22987;</div>
        <div id="roma-display">tap to start</div>
        <div id="score-board">SCORE: <span id="score">0</span> | <span id="counter">PROGRESS: 0 / 23</span></div>
        <button id="start-btn" onclick="startGame()">START</button>
        <div class="info">※半角英数モードで入力<br>JI / JU / FU / TU / TI / SI / SYE 固定</div>
    </div>

    <input type="text" id="hidden-input" autocomplete="off">

    <script>
        // 一人ずつデータを手動で最適化（変換エラーを防ぐため）
        const originalQuestions = [
            { k: "ようしょうきんほう", r: "yousyoukinhou" },
            { k: "じんしの", r: "jinshino" }, // 修正：jiに統一
            { k: "たかはしかいせ", r: "takahashikaise" },
            { k: "やまもとゆきの", r: "yamamotoyukino" },
            { k: "ふるはしまな", r: "furuhasimana" }, // fu
            { k: "はやししゅうご", r: "hayasisyuugo" }, // si, syuu
            { k: "なかたにはるか", r: "nakataniharuka" },
            { k: "おかだつぐみ", r: "okadatugumi" }, // tu
            { k: "ささきたかまさ", r: "sasakitakamasa" },
            { k: "さだまさはるか", r: "sadamasaharuka" },
            { k: "みずのえま", r: "mizunoema" },
            { k: "おおむろほおり", r: "oomurohoori" },
            { k: "ごはいよう", r: "gohaiyou" },
            { k: "しゃへいじゅん", r: "syaheijun" }, // sye, ju
            { k: "たかしまあらた", r: "takasimaarata" }, // si
            { k: "ちんいりん", r: "tinirin" }, // ti
            { k: "わかまつえいと", r: "wakamatueito" },
            { k: "つかもとあさ", r: "tukamotoasa" }, // tu
            { k: "しゅうかずまさ", r: "syuukazumasa" }, // syuu
            { k: "よしだめい", r: "yosidamei" }, // si
            { k: "どましぇんこにこる", r: "domasyenkonikoru" }, // 修正：sye
            { k: "かいだみら", r: "kaidamira" },
            { k: "いしいみつき", r: "isiimituki" } // si, ti
        ];

        // ルールを強制適用する関数（一人ずつ丁寧に処理）
        const finalizedQuestions = originalQuestions.map(q => {
            let roma = q.r
                .replace(/zi/g, "ji")
                .replace(/zyu/g, "ju")
                .replace(/hu/g, "fu")
                .replace(/tsu/g, "tu")
                .replace(/chi/g, "ti")
                .replace(/shi/g, "si");
            
            // 表示用の漢字変換（文字化け対策）
            let kanaHtml = q.k; 
            return { k: kanaHtml, r: roma, raw: q.k };
        });

        let shuffledList = [];
        let currentQ = null;
        let charIndex = 0;
        let score = 0;
        let isStarted = false;

        const kanaElement = document.getElementById("kana-display");
        const romaElement = document.getElementById("roma-display");
        const scoreElement = document.getElementById("score");
        const counterElement = document.getElementById("counter");
        const inputElement = document.getElementById("hidden-input");
        const startBtn = document.getElementById("start-btn");
        const okBadge = document.getElementById("ok-badge");

        function shuffle(array) {
            let arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function speak(text) {
            if (!window.speechSynthesis) return;
            speechSynthesis.cancel();
            const uttr = new SpeechSynthesisUtterance(text);
            uttr.lang = 'ja-JP';
            speechSynthesis.speak(uttr);
        }

        function startGame() {
            isStarted = true;
            startBtn.style.display = "none";
            inputElement.focus();
            nextQuestion();
        }

        function focusInput() {
            if (isStarted) inputElement.focus();
        }

        function nextQuestion() {
            if (shuffledList.length === 0) {
                shuffledList = shuffle(finalizedQuestions);
            }
            currentQ = shuffledList.pop();
            charIndex = 0;
            updateDisplay();
            speak(currentQ.raw);
            const finished = finalizedQuestions.length - shuffledList.length;
            counterElement.innerText = `PROGRESS: ${finished} / ${finalizedQuestions.length}`;
            inputElement.value = "";
        }

        function updateDisplay() {
            kanaElement.innerText = currentQ.k;
            let html = "";
            for (let i = 0; i < currentQ.r.length; i++) {
                if (i < charIndex) html += `<span class="correct">${currentQ.r[i]}</span>`;
                else if (i === charIndex) html += `<span class="cursor">${currentQ.r[i]}</span>`;
                else html += `<span>${currentQ.r[i]}</span>`;
            }
            romaElement.innerHTML = html;
        }

        function showOk() {
            okBadge.classList.add("show");
            setTimeout(() => {
                okBadge.classList.remove("show");
                nextQuestion();
            }, 600);
        }

        inputElement.addEventListener("input", (e) => {
            if (!isStarted || okBadge.classList.contains("show")) return;
            const val = inputElement.value.toLowerCase();
            const targetChar = currentQ.r[charIndex];

            if (val.endsWith(targetChar)) {
                charIndex++;
                if (charIndex === currentQ.r.length) {
                    score++;
                    scoreElement.innerText = score;
                    showOk();
                } else {
                    updateDisplay();
                }
            }
        });
    </script>
</body>
</html>
