<!DOCTYPE html>
<html lang="ja">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <meta name="robots" content="noindex,nofollow">
    <title>Classmate Typing - Visual Finger Guide</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #fdfdfd; color: #333; margin: 0; min-height: 100vh; padding: 10px; box-sizing: border-box; }
        #container { text-align: center; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 700px; position: relative; margin-bottom: 15px; }
        #kana-display { font-size: 2rem; font-weight: bold; margin-bottom: 5px; color: #2c3e50; }
        #roma-display { font-size: 1.5rem; letter-spacing: 0.1em; color: #95a5a6; min-height: 1.2em; text-transform: lowercase; }
        
        /* 指ナビゲーターのスタイル */
        #finger-navigator {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin: 20px 0;
            height: 40px;
        }
        .finger-dot {
            width: 15px;
            height: 15px;
            border-radius: 50%;
            background-color: #eee;
            transition: all 0.2s ease;
            border: 2px solid #ddd;
        }
        .finger-dot.active {
            transform: scale(2.2);
            border-color: rgba(0,0,0,0.1);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .hand-separator { width: 30px; } /* 左右の手の間の隙間 */

        .correct { color: #dcdde1; }
        .cursor { color: #e67e22; border-bottom: 3px solid #e67e22; }
        
        #virtual-keyboard { background: #d1d4d9; padding: 12px; border-radius: 12px; width: 100%; max-width: 700px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); user-select: none; }
        .keyboard-row { display: flex; justify-content: flex-start; margin-bottom: 6px; }
        .key-btn { background: #ffffff; border: none; border-radius: 6px; flex: 1; max-width: 45px; height: 45px; margin: 0 2px; display: flex; align-items: center; justify-content: center; font-size: 1rem; font-weight: bold; color: #444; box-shadow: 0 3px 0 #adb1b8; position: relative; }

        /* キーボード上の指色付け */
        .pinky { border-top: 4px solid #ff79c6; }
        .ring  { border-top: 4px solid #8be9fd; }
        .middle { border-top: 4px solid #50fa7b; }
        .index { border-top: 4px solid #ffb86c; }

        .row-1 { padding-left: 0px; }
        .row-2 { padding-left: 15px; }
        .row-3 { padding-left: 40px; }
        .hand-gap { width: 35px; flex-shrink: 0; }

        .home-pos { text-decoration: underline; text-underline-offset: 4px; text-decoration-thickness: 2px; }
        .highlight-key { background-color: #444 !important; color: white !important; transform: scale(1.05); box-shadow: 0 0 10px rgba(0,0,0,0.3) !important; }

        #ok-badge { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); font-size: 3rem; font-weight: bold; color: #27ae60; background: rgba(255,255,255,0.9); padding: 10px 30px; border-radius: 100px; border: 6px solid #27ae60; z-index: 20; transition: transform 0.2s; }
        #ok-badge.show { transform: translate(-50%, -50%) scale(1); }
        #start-btn { background: #e67e22; color: white; border: none; padding: 12px 30px; border-radius: 50px; font-size: 1.2rem; font-weight: bold; cursor: pointer; margin-top: 15px; }
        #hidden-input { position: absolute; opacity: 0; pointer-events: none; }
    </style>
</head>
<body onclick="focusInput()">

    <div id="container">
        <div id="ok-badge">OK!</div>
        <div id="kana-display">タイピング練習</div>
        <div id="roma-display">press START</div>
        
        <div id="finger-navigator">
            <div class="finger-dot" id="dot-L5" title="左小指"></div>
            <div class="finger-dot" id="dot-L4" title="左薬指"></div>
            <div class="finger-dot" id="dot-L3" title="左中指"></div>
            <div class="finger-dot" id="dot-L2" title="左人差指"></div>
            <div class="hand-separator"></div>
            <div class="finger-dot" id="dot-R2" title="右人差指"></div>
            <div class="finger-dot" id="dot-R3" title="右中指"></div>
            <div class="finger-dot" id="dot-R4" title="右薬指"></div>
            <div class="finger-dot" id="dot-R5" title="右小指"></div>
        </div>

        <div id="score-board">SCORE: <span id="score">0</span> / 23</div>
        <button id="start-btn" onclick="startGame()">START</button>
    </div>

    <input type="text" id="hidden-input" autocomplete="off">

    <div id="virtual-keyboard">
        <div class="keyboard-row row-1">
            <div class="key-btn pinky" data-key="q">Q</div>
            <div class="key-btn ring" data-key="w">W</div>
            <div class="key-btn middle" data-key="e">E</div>
            <div class="key-btn index" data-key="r">R</div>
            <div class="key-btn index" data-key="t">T</div>
            <div class="hand-gap"></div>
            <div class="key-btn index" data-key="y">Y</div>
            <div class="key-btn index" data-key="u">U</div>
            <div class="key-btn middle" data-key="i">I</div>
            <div class="key-btn ring" data-key="o">O</div>
            <div class="key-btn pinky" data-key="p">P</div>
        </div>
        <div class="keyboard-row row-2">
            <div class="key-btn pinky" data-key="a">A</div>
            <div class="key-btn ring" data-key="s">S</div>
            <div class="key-btn middle" data-key="d">D</div>
            <div class="key-btn index home-pos" data-key="f">F</div>
            <div class="key-btn index" data-key="g">G</div>
            <div class="hand-gap"></div>
            <div class="key-btn index" data-key="h">H</div>
            <div class="key-btn index home-pos" data-key="j">J</div>
            <div class="key-btn middle" data-key="k">K</div>
            <div class="key-btn ring" data-key="l">L</div>
        </div>
        <div class="keyboard-row row-3">
            <div class="key-btn pinky" data-key="z">Z</div>
            <div class="key-btn ring" data-key="x">X</div>
            <div class="key-btn middle" data-key="c">C</div>
            <div class="key-btn index" data-key="v">V</div>
            <div class="key-btn index" data-key="b">B</div>
            <div class="hand-gap"></div>
            <div class="key-btn index" data-key="n">N</div>
            <div class="key-btn middle" data-key="m">M</div>
        </div>
    </div>

    <script>
        // 指とドットIDのマッピング
        const fingerToDot = {
            'q':'L5', 'a':'L5', 'z':'L5',
            'w':'L4', 's':'L4', 'x':'L4',
            'e':'L3', 'd':'L3', 'c':'L3',
            'r':'L2', 'f':'L2', 'v':'L2', 't':'L2', 'g':'L2', 'b':'L2',
            'y':'R2', 'h':'R2', 'n':'R2', 'u':'R2', 'j':'R2',
            'i':'R3', 'k':'R3', 'm':'R3',
            'o':'R4', 'l':'R4',
            'p':'R5'
        };

        const fingerColors = {
            'L5':'#ff79c6', 'R5':'#ff79c6',
            'L4':'#8be9fd', 'R4':'#8be9fd',
            'L3':'#50fa7b', 'R3':'#50fa7b',
            'L2':'#ffb86c', 'R2':'#ffb86c'
        };

        const originalQuestions = [
            { k: "ようしょうきんほう", r: "yousyoukinhou" }, { k: "じんしの", r: "jinshino" }, { k: "たかはしかいせ", r: "takahashikaise" },
            { k: "やまもとゆきの", r: "yamamotoyukino" }, { k: "ふるはしまな", r: "furuhasimana" }, { k: "はやししゅうご", r: "hayasisyuugo" },
            { k: "なかたにはるか", r: "nakataniharuka" }, { k: "おかだつぐみ", r: "okadatugumi" }, { k: "ささきたかまさ", r: "sasakitakamasa" },
            { k: "さだまさはるか", r: "sadamasaharuka" }, { k: "みずのえま", r: "mizunoema" }, { k: "おおむろほおり", r: "oomurohoori" },
            { k: "ごはいよう", r: "gohaiyou" }, { k: "しゃへいじゅん", r: "syaheijun" }, { k: "たかしまあらた", r: "takasimaarata" },
            { k: "ちんいりん", r: "tinirin" }, { k: "わかまつえいと", r: "wakamatueito" }, { k: "つかもとあさ", r: "tukamotoasa" },
            { k: "しゅうかずまさ", r: "syuukazumasa" }, { k: "よしだめい", r: "yosidamei" }, { k: "どましぇんこにこる", r: "domasyenkonikoru" },
            { k: "かいだみら", r: "kaidamira" }, { k: "いしいみつき", r: "isiimituki" }
        ];

        const finalizedQuestions = originalQuestions.map(q => {
            let roma = q.r.replace(/zi/g, "ji").replace(/zyu/g, "ju").replace(/hu/g, "fu").replace(/tsu/g, "tu").replace(/chi/g, "ti").replace(/shi/g, "si");
            return { k: q.k, r: roma };
        });

        let shuffledList = [], currentQ = null, charIndex = 0, score = 0, isStarted = false;
        const kanaElement = document.getElementById("kana-display"), romaElement = document.getElementById("roma-display"), scoreElement = document.getElementById("score"), inputElement = document.getElementById("hidden-input"), startBtn = document.getElementById("start-btn"), okBadge = document.getElementById("ok-badge");
        const keyButtons = document.querySelectorAll('.key-btn');
        const fingerDots = document.querySelectorAll('.finger-dot');

        function startGame() { isStarted = true; startBtn.style.display = "none"; inputElement.focus(); nextQuestion(); }
        function focusInput() { if (isStarted) inputElement.focus(); }

        function nextQuestion() {
            if (shuffledList.length === 0) shuffledList = [...finalizedQuestions].sort(() => Math.random() - 0.5);
            currentQ = shuffledList.pop();
            charIndex = 0;
            updateDisplay();
            if (window.speechSynthesis) {
                speechSynthesis.cancel();
                const uttr = new SpeechSynthesisUtterance(currentQ.k);
                uttr.lang = 'ja-JP';
                speechSynthesis.speak(uttr);
            }
        }

        function updateDisplay() {
            kanaElement.innerText = currentQ.k;
            let html = "";
            for (let i = 0; i < currentQ.r.length; i++) {
                if (i < charIndex) html += `<span class="correct">${currentQ.r[i]}</span>`;
                else if (i === charIndex) html += `<span class="cursor">${currentQ.r[i]}</span>`;
                else html += `<span>${currentQ.r[i]}</span>`;
            }
            romaElement.innerHTML = html;
            updateVisualAids();
        }

        function updateVisualAids() {
            // キーボードのハイライト解除
            keyButtons.forEach(btn => btn.classList.remove('highlight-key'));
            // ドットのハイライト解除
            fingerDots.forEach(dot => {
                dot.classList.remove('active');
                dot.style.backgroundColor = '#eee';
            });

            const targetChar = currentQ.r[charIndex];
            const targetBtn = document.querySelector(`.key-btn[data-key="${targetChar}"]`);
            
            if (targetBtn) {
                targetBtn.classList.add('highlight-key');
                const dotId = fingerToDot[targetChar];
                const activeDot = document.getElementById(`dot-${dotId}`);
                if (activeDot) {
                    activeDot.classList.add('active');
                    activeDot.style.backgroundColor = fingerColors[dotId];
                }
            }
        }

        inputElement.addEventListener("input", (e) => {
            if (!isStarted || okBadge.classList.contains("show")) return;
            const val = inputElement.value.toLowerCase();
            const targetChar = currentQ.r[charIndex];
            if (val.endsWith(targetChar)) {
                charIndex++;
                if (charIndex === currentQ.r.length) {
                    score++;
                    scoreElement.innerText = score;
                    okBadge.classList.add("show");
                    setTimeout(() => { okBadge.classList.remove("show"); nextQuestion(); }, 600);
                } else {
                    updateDisplay();
                }
            }
            inputElement.value = "";
        });
    </script>
</body>
</html>
