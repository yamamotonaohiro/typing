<!DOCTYPE html>
<html lang="ja">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex,nofollow">
    <title>Classmate Typing - Mobile Ready</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #fdfdfd; color: #333; margin: 0; min-height: 100vh; padding: 20px; box-sizing: border-box; }
        #container { text-align: center; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 500px; margin-bottom: 20px; }
        #kana-display { font-size: 2rem; font-weight: bold; margin-bottom: 10px; color: #2c3e50; }
        #roma-display { font-size: 1.5rem; letter-spacing: 0.1em; color: #95a5a6; min-height: 1.2em; text-transform: lowercase; }
        .correct { color: #dcdde1; }
        .cursor { color: #e67e22; border-bottom: 3px solid #e67e22; }
        #score-board { margin-top: 20px; font-size: 1rem; color: #7f8c8d; }
        
        /* 仮想キーボードのスタイル */
        #keyboard { display: grid; grid-template-columns: repeat(10, 1fr); gap: 5px; width: 100%; max-width: 600px; background: #eee; padding: 10px; border-radius: 10px; }
        .key { background: white; border: none; padding: 15px 0; border-radius: 5px; font-size: 1.2rem; font-weight: bold; cursor: pointer; user-select: none; box-shadow: 0 2px 0 #ccc; }
        .key:active { transform: translateY(2px); box-shadow: none; background: #ddd; }
        .key-space { grid-column: span 10; background: #fff; }
        .info { font-size: 0.7rem; color: #e74c3c; margin-top: 10px; font-weight: bold; line-height: 1.4; }
    </style>
</head>
<body>

    <div id="container">
        <div id="kana-display">&#12473;&#12506;&#12540;&#12473;&#12434;&#25276;&#12377;&#12363;&#12479;&#12483;&#12503;</div>
        <div id="roma-display">tap space to start</div>
        <div id="score-board">SCORE: <span id="score">0</span> | <span id="counter">PROGRESS: 0 / 23</span></div>
        <div class="info">※JU/FU/TU/TI/SI/SYE固定</div>
    </div>

    <div id="keyboard">
        <button class="key" onclick="handleInput('q')">Q</button>
        <button class="key" onclick="handleInput('w')">W</button>
        <button class="key" onclick="handleInput('e')">E</button>
        <button class="key" onclick="handleInput('r')">R</button>
        <button class="key" onclick="handleInput('t')">T</button>
        <button class="key" onclick="handleInput('y')">Y</button>
        <button class="key" onclick="handleInput('u')">U</button>
        <button class="key" onclick="handleInput('i')">I</button>
        <button class="key" onclick="handleInput('o')">O</button>
        <button class="key" onclick="handleInput('p')">P</button>
        <button class="key" onclick="handleInput('a')">A</button>
        <button class="key" onclick="handleInput('s')">S</button>
        <button class="key" onclick="handleInput('d')">D</button>
        <button class="key" onclick="handleInput('f')">F</button>
        <button class="key" onclick="handleInput('g')">G</button>
        <button class="key" onclick="handleInput('h')">H</button>
        <button class="key" onclick="handleInput('j')">J</button>
        <button class="key" onclick="handleInput('k')">K</button>
        <button class="key" onclick="handleInput('l')">L</button>
        <button class="key" onclick="handleInput('z')">Z</button>
        <button class="key" onclick="handleInput('x')">X</button>
        <button class="key" onclick="handleInput('c')">C</button>
        <button class="key" onclick="handleInput('v')">V</button>
        <button class="key" onclick="handleInput('b')">B</button>
        <button class="key" onclick="handleInput('n')">N</button>
        <button class="key" onclick="handleInput('m')">M</button>
        <button class="key key-space" onclick="handleInput(' ')">SPACE (START)</button>
    </div>

    <script>
        const originalQuestions = [
            { k: "&#12424;&#12358;&#12375;&#12423;&#12358;&#12365;&#12435;&#12411;&#12358;", r: "yousyoukinhou", raw: "ようしょうきんほう" },
            { k: "&#12376;&#12435;&#12375;&#12398;", r: "zinsino", raw: "じんしの" },
            { k: "&#12383;&#12363;&#12399;&#12375;&#12363;&#12356;&#12379;", r: "takahasikaise", raw: "たかはしかいせ" },
            { k: "&#12420;&#12414;&#12418;&#12392;&#12422;&#12365;&#12398;", r: "yamamotoyukino", raw: "やまもとゆきの" },
            { k: "&#12405;&#12427;&#12399;&#12375;&#12414;&#12394;", r: "furuhasimana", raw: "ふるはしまな" },
            { k: "&#12399;&#12420;&#12375;&#12375;&#12422;&#12358;&#12372;", r: "hayasisyuugo", raw: "はやししゅうご" },
            { k: "&#12394;&#12363;&#12383;&#12395;&#12399;&#12427;&#12363;", r: "nakataniharuka", raw: "なかたにはるか" },
            { k: "&#12362;&#12363;&#12384;&#12388;&#12368;&#12415;", r: "okadatugumi", raw: "おかだつぐみ" },
            { k: "&#12373;&#12373;&#12365;&#12383;&#12363;&#12414;&#12373;", r: "sasakitakamasa", raw: "ささきたかまさ" },
            { k: "&#12373;&#12384;&#12414;&#12373;&#12399;&#12427;&#12363;", r: "sadamasaharuka", raw: "さだまさはるか" },
            { k: "&#12415;&#12378;&#12398;&#12360;&#12414;", r: "mizunoema", raw: "みずのえま" },
            { k: "&#12362;&#12362;&#12416;&#12429;&#12411;&#12362;&#12426;", r: "oomurohoori", raw: "おおむろほおり" },
            { k: "&#12372;&#12399;&#12356;&#12424;&#12358;", r: "gohaiyou", raw: "ごはいよう" },
            { k: "&#12375;&#12419;&#12408;&#12356;&#12376;&#12422;&#12435;", r: "syaheijun", raw: "しゃへいじゅん" },
            { k: "&#12383;&#12363;&#12375;&#12414;&#12354;&#12425;&#12383;", r: "takasimaarata", raw: "たかしまあらた" },
            { k: "&#12385;&#12435;&#12356;&#12426;&#12435;", r: "tinirin", raw: "ちんいりん" },
            { k: "&#12431;&#12363;&#12414;&#12388;&#12360;&#12356;&#12392;", r: "wakamatuueito", raw: "わかまつえいと" },
            { k: "&#12388;&#12363;&#12418;&#12392;&#12354;&#12373;", r: "tukamotoasa", raw: "つかもとあさ" },
            { k: "&#12375;&#12422;&#12358;&#12363;&#12378;&#12414;&#12373;", r: "syuukazumasa", raw: "しゅうかずまさ" },
            { k: "&#12424;&#12375;&#12384;&#12417;&#12356;", r: "yosidamei", raw: "よしだめい" },
            { k: "&#12393;&#12414;&#12375;&#12361;&#12435;&#12371;&#12395;&#12371;&#12427;", r: "domasyenkonikoru", raw: "どましぇんこにこる" },
            { k: "&#12363;&#12356;&#12384;&#12415;&#12425;", r: "kaidamira", raw: "かいだみら" },
            { k: "&#12356;&#12375;&#12356;&#12415;&#12388;&#12365;", r: "isiimituki", raw: "いしいみつき" }
        ];

        let shuffledList = [];
        let currentQ = null;
        let charIndex = 0;
        let score = 0;
        let isStarted = false;

        const kanaElement = document.getElementById("kana-display");
        const romaElement = document.getElementById("roma-display");
        const scoreElement = document.getElementById("score");
        const counterElement = document.getElementById("counter");

        function shuffle(array) {
            let arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function speak(text) {
            if (!window.speechSynthesis) return;
            speechSynthesis.cancel(); 
            const uttr = new SpeechSynthesisUtterance(text);
            uttr.lang = 'ja-JP';
            speechSynthesis.speak(uttr);
        }

        function nextQuestion() {
            if (shuffledList.length === 0) {
                shuffledList = shuffle(originalQuestions);
            }
            currentQ = shuffledList.pop();
            charIndex = 0;
            speak(currentQ.raw);
            updateDisplay();
            const finished = originalQuestions.length - shuffledList.length;
            counterElement.innerText = `PROGRESS: ${finished} / ${originalQuestions.length}`;
        }

        function updateDisplay() {
            kanaElement.innerHTML = currentQ.k;
            let html = "";
            for (let i = 0; i < currentQ.r.length; i++) {
                if (i < charIndex) html += `<span class="correct">${currentQ.r[i]}</span>`;
                else if (i === charIndex) html += `<span class="cursor">${currentQ.r[i]}</span>`;
                else html += `<span>${currentQ.r[i]}</span>`;
            }
            romaElement.innerHTML = html;
        }

        // 入力処理（PCキーボードとスマホ画面ボタン共通）
        function handleInput(key) {
            const input = key.toLowerCase();
            if (input === " " || input === "space") {
                if (!isStarted) {
                    isStarted = true;
                    nextQuestion();
                }
                return;
            }
            
            if (isStarted && currentQ) {
                if (input === currentQ.r[charIndex]) {
                    charIndex++;
                    if (charIndex === currentQ.r.length) {
                        score++;
                        scoreElement.innerText = score;
                        nextQuestion();
                    } else {
                        updateDisplay();
                    }
                }
            }
        }

        // PCキーボード入力の監視
        window.addEventListener("keydown", (e) => {
            if (e.code === "Space") e.preventDefault(); // スクロール防止
            handleInput(e.key === " " ? "space" : e.key);
        });
    </script>
</body>
</html>
