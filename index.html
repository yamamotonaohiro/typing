<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>タッチタイピングの練習</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #fdfdfd; color: #333; margin: 0; min-height: 100vh; padding: 2px; box-sizing: border-box; }
        #container { text-align: center; background: white; padding: 10px 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 750px; position: relative; margin-bottom: 2px; z-index: 10; }
        #top-settings { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 8px; margin-bottom: 8px; flex-wrap: wrap; gap: 10px; }
        #course-area { display: flex; align-items: center; gap: 8px; }
        .course-btn { background: #3498db; color: white; border: none; padding: 6px 12px; border-radius: 6px; font-size: 0.85rem; cursor: pointer; transition: all 0.2s; font-weight: bold; opacity: 0.8; }
        .course-btn.active { background: #e67e22 !important; opacity: 1; }
        #score-board { font-weight: bold; color: #2c3e50; font-size: 1.1rem; min-width: 150px; }
        #audio-toggle { background: #ffffff; border: 2px solid #e67e22; border-radius: 50px; padding: 3px 12px; cursor: pointer; font-size: 0.8rem; color: #e67e22; font-weight: bold; }
        #question-box { background: #fafafa; border: 2px solid #eaeeef; border-radius: 15px; padding: 5px 10px; margin: 0 0 2px 0; min-height: 85px; display: flex; flex-direction: column; justify-content: center; position: relative; }
        #sub-display { font-size: 2.2rem; font-weight: bold; margin-bottom: 2px; color: #2c3e50; }
        #roma-display { font-size: 1.7rem; letter-spacing: 0.15em; color: #bdc3c7; min-height: 1.1em; text-transform: lowercase; }
        #result-screen { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 255, 255, 0.98); border-radius: 20px; z-index: 200; flex-direction: column; justify-content: center; align-items: center; }
        #result-screen h2 { font-size: 2.2rem; color: #27ae60; margin: 0 0 10px 0; }
        .result-btns { display: flex; gap: 15px; }
        .btn-gray { background: #95a5a6 !important; }
        .ok-effect { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 5rem; font-weight: 900; color: #27ae60; text-shadow: 0 0 20px #fff; animation: giantPop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; pointer-events: none; z-index: 100; }
        @keyframes giantPop { 0% { opacity: 0; transform: translate(-50%, -30%) scale(0.3); } 50% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); } 100% { opacity: 0; transform: translate(-50%, -70%) scale(1.2); } }
        
        /* キーボード */
        #keyboard-area { width: 920px; background: #d1d4d9; padding: 10px 0; border-radius: 12px; display: flex; flex-direction: column; align-items: center; position: relative; }
        .keyboard-row { display: flex; justify-content: center; width: 100%; margin-bottom: 4px; }
        .key-btn { border: 2px solid rgba(0,0,0,0.05); border-radius: 6px; width: 55px; height: 55px; margin: 0 3px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; font-weight: bold; color: #444; position: relative; flex-shrink: 0; box-sizing: border-box; transition: all 0.1s ease; }
        
        /* 【修正：ホームポジション F と J のデザイン強化】 */
        .home-pos { 
            border: 3px solid #555 !important; 
            box-shadow: inset 0 -4px 0 #888;
        }
        /* FとJのキーにある突起を擬似要素で作成 */
        .home-pos::after {
            content: "";
            position: absolute;
            bottom: 8px;
            width: 20px;
            height: 4px;
            background: #555;
            border-radius: 2px;
        }

        .hand-gap { width: 80px; } 
        .pinky { background-color: #ffcceb; border-bottom: 3px solid #ff79c6; }
        .ring { background-color: #d1f7ff; border-bottom: 3px solid #8be9fd; }
        .middle { background-color: #d4fee0; border-bottom: 3px solid #50fa7b; }
        .index { background-color: #ffebd1; border-bottom: 3px solid #ffb86c; }

        .pinky.highlight-key { background-color: #ff33b5 !important; color: white !important; box-shadow: 0 0 20px #ff33b5; transform: scale(1.1); z-index: 5; }
        .ring.highlight-key { background-color: #00d4ff !important; color: white !important; box-shadow: 0 0 20px #00d4ff; transform: scale(1.1); z-index: 5; }
        .middle.highlight-key { background-color: #00ff44 !important; color: white !important; box-shadow: 0 0 20px #00ff44; transform: scale(1.1); z-index: 5; }
        .index.highlight-key { background-color: #ff9900 !important; color: white !important; box-shadow: 0 0 20px #ff9900; transform: scale(1.1); z-index: 5; }
        
        #finger-navigator { display: flex; justify-content: center; margin-top: 10px; padding: 0; background: rgba(255,255,255,0.2); border-radius: 15px; align-items: flex-end; width: fit-content; transform: translateX(12px); }
        .nav-group { display: flex; }
        .hand-separator { width: 120px; } 
        .dot-container { width: 61px; display: flex; flex-direction: column; align-items: center; position: relative; height: 80px; }
        .finger-shape { position: absolute; bottom: 0; width: 42px; background: rgba(0, 0, 0, 0.08); border-radius: 20px 20px 5px 5px; z-index: 1; }
        .f-pinky { height: 45px; } .f-ring { height: 60px; } .f-middle { height: 70px; } .f-index { height: 63px; } .f-thumb { height: 35px; } 
        .finger-dot { width: 18px; height: 18px; border-radius: 50%; border: 2px solid rgba(0,0,0,0.1); margin-top: 5px; z-index: 2; position: relative; opacity: 0.7; }
        #dot-L5, #dot-R5 { top: 32px; background-color: #ff79c6; } 
        #dot-L4, #dot-R4 { top: 12px; background-color: #8be9fd; } 
        #dot-L3, #dot-R3 { top: 5px; background-color: #50fa7b; } 
        #dot-L2, #dot-R2 { top: 10px; background-color: #ffb86c; } 
        .finger-dot.active { transform: scale(2.2); opacity: 1; box-shadow: 0 0 10px rgba(0,0,0,0.3); }
        #hidden-input { position: absolute; opacity: 0; left: -9999px; }
    </style>
</head>
<body onclick="focusInput()">
    <div id="container">
        <div id="result-screen">
            <h2>お疲れ様でした！</h2>
            <p id="result-text"></p>
            <div class="result-btns">
                <button class="course-btn active" onclick="resetGame()">もう一度練習する</button>
                <button class="course-btn btn-gray" onclick="backToMenu()">メニューに戻る</button>
            </div>
        </div>
        <div id="top-settings">
            <div id="course-area">
                <span style="font-size:0.85rem;font-weight:bold;color:#7f8c8d;">コース：</span>
                <div id="course-select">
                    <button id="btn-course-0" class="course-btn" onclick="selectCourse(0)">２年１組</button>
                    <button id="btn-course-1" class="course-btn" onclick="selectCourse(1)">都道府県</button>
                    <button id="btn-course-2" class="course-btn" onclick="selectCourse(2)">５０音</button>
                </div>
            </div>
            <div id="score-board">PROGRESS: <span id="current-count">0</span> / <span id="total-count">0</span></div>
            <button id="audio-toggle" onclick="toggleAudio()">音: <span id="audio-text">ON</span></button>
        </div>
        <div id="question-box">
            <div id="sub-display">コースを選んでスタート</div>
            <div id="roma-display"></div>
        </div>
    </div>
    <div id="keyboard-area">
        <div id="virtual-keyboard">
            <div class="keyboard-row" style="transform: translateX(-15px);">
                <div class="key-btn pinky" data-key="q">Q</div><div class="key-btn ring" data-key="w">W</div><div class="key-btn middle" data-key="e">E</div><div class="key-btn index" data-key="r">R</div><div class="key-btn index" data-key="t">T</div>
                <div class="hand-gap"></div>
                <div class="key-btn index" data-key="y">Y</div><div class="key-btn index" data-key="u">U</div><div class="key-btn middle" data-key="i">I</div><div class="key-btn ring" data-key="o">O</div><div class="key-btn pinky" data-key="p">P</div>
            </div>
            <div class="keyboard-row" style="transform: translateX(10px);">
                <div class="key-btn pinky" data-key="a">A</div><div class="key-btn ring" data-key="s">S</div><div class="key-btn middle" data-key="d">D</div><div class="key-btn index home-pos" data-key="f">F</div><div class="key-btn index" data-key="g">G</div>
                <div class="hand-gap"></div>
                <div class="key-btn index" data-key="h">H</div><div class="key-btn index home-pos" data-key="j">J</div><div class="key-btn middle" data-key="k">K</div><div class="key-btn ring" data-key="l">L</div><div class="key-btn pinky" style="visibility:hidden"></div>
            </div>
            <div class="keyboard-row" style="transform: translateX(35px);">
                <div class="key-btn pinky" data-key="z">Z</div><div class="key-btn ring" data-key="x">X</div><div class="key-btn middle" data-key="c">C</div><div class="key-btn index" data-key="v">V</div><div class="key-btn index" data-key="b">B</div>
                <div class="hand-gap"></div>
                <div class="key-btn index" data-key="n">N</div><div class="key-btn index" data-key="m">M</div><div class="key-btn middle" style="visibility:hidden"></div><div class="key-btn ring" style="visibility:hidden"></div><div class="key-btn pinky" style="visibility:hidden"></div>
            </div>
        </div>
        <div id="finger-navigator">
            <div class="nav-group">
                <div class="dot-container"><div class="finger-dot" id="dot-L5"></div><div class="finger-shape f-pinky"></div></div>
                <div class="dot-container"><div class="finger-dot" id="dot-L4"></div><div class="finger-shape f-ring"></div></div>
                <div class="dot-container"><div class="finger-dot" id="dot-L3"></div><div class="finger-shape f-middle"></div></div>
                <div class="dot-container"><div class="finger-dot" id="dot-L2"></div><div class="finger-shape f-index"></div></div>
                <div class="dot-container"><div class="finger-shape f-thumb"></div></div> 
            </div>
            <div class="hand-separator"></div>
            <div class="nav-group">
                <div class="dot-container"><div class="finger-shape f-thumb"></div></div> 
                <div class="dot-container"><div class="finger-dot" id="dot-R2"></div><div class="finger-shape f-index"></div></div>
                <div class="dot-container"><div class="finger-dot" id="dot-R3"></div><div class="finger-shape f-middle"></div></div>
                <div class="dot-container"><div class="finger-dot" id="dot-R4"></div><div class="finger-shape f-ring"></div></div>
                <div class="dot-container"><div class="finger-dot" id="dot-R5"></div><div class="finger-shape f-pinky"></div></div>
            </div>
        </div>
    </div>
    <input type="text" id="hidden-input" autocomplete="off" inputmode="url">
    <script>
        const rawData = [
            ["いしいみつき", "ほっかいどう"], ["おおむろほおり", "あおもり"], ["おかだつぐみ", "いわて"], ["かいだみら", "みやぎ"],
            ["ごはいよう", "あきた"], ["ささきたかまさ", "やまがた"], ["さだまさはるか", "ふくしま"], ["しゃへいじゅん", "いばらき"],
            ["しゅうかずまさ", "とちぎ"], ["じんしの", "ぐんま"], ["たかしまあらた", "さいたま"], ["たかはしかいせ", "ちば"],
            ["ちんいりん", "とうきょう"], ["つかもとあさ", "かながわ"], ["どましぇんこにこる", "にいがた"], ["なかたにはるか", "とやま"],
            ["はやししゅうご", "いしかわ"], ["ふるはしまな", "ふくい"], ["ほんじょうまいこ", "やまなし"], ["みずのえま", "ながの"],
            ["やまもとゆきの", "ぎふ"], ["ようしょうきんほう", "しずおか"], ["よしだめい", "あいち"], ["わかまつえいと", "みえ"],
            ["のろのりこ", "しが"], ["", "きょうと"], ["", "おおさか"], ["", "ひょうご"], ["", "なら"],
            ["", "わかやま"], ["", "とっとり"], ["", "しまね"], ["", "おかやま"], ["", "ひろしま"],
            ["", "やまぐち"], ["", "とくしま"], ["", "かがわ"], ["", "えひめ"], ["", "こうち"],
            ["", "ふくおか"], ["", "さが"], ["", "ながさき"], ["", "くまもと"], ["", "おおいた"],
            ["", "みやざき"], ["", "かごしま"], ["", "おきなわ"]
        ];
        const aiuData = ["あ","い","う","え","お","か","き","く","け","こ","さ","し","す","せ","そ","た","ち","つ","て","と","な","に","ぬ","ね","の","は","ひ","ふ","へ","ほ","ま","み","む","め","も","や","ゆ","よ","ら","り","る","れ","ろ","わ","を","ん"];
        const kanaMap = {
            'あ':'a','い':'i','う':'u','え':'e','お':'o','か':'ka','き':'ki','く':'ku','け':'ke','こ':'ko','さ':'sa','し':'si','す':'su','せ':'se','そ':'so','た':'ta','ち':'ti','つ':'tu','て':'te','と':'to','な':'na','に':'ni','ぬ':'nu','ね':'ne','の':'no','は':'ha','ひ':'hi','ふ':'fu','へ':'he','ほ':'ho','ま':'ma','み':'mi','む':'mu','め':'me','も':'mo','や':'ya','ゆ':'yu','よ':'yo','ら':'ra','り':'ri','る':'ru','れ':'re','ろ':'ro','わ':'wa','を':'wo','が':'ga','ぎ':'gi','ぐ':'gu','げ':'ge','ご':'go','ざ':'za','じ':'zi','ず':'zu','ぜ':'ze','ぞ':'zo','だ':'da','ぢ':'zi','づ':'zu','で':'de','ど':'do','ば':'ba','び':'bi','ぶ':'bu','べ':'be','ぼ':'bo','ぱ':'pa','ぴ':'pi','ぷ':'pu','ぺ':'pe','ぽ':'po','きゃ':'kya','きゅ':'kyu','きょ':'kyo','しゃ':'sya','しゅ':'syu','しょ':'syo','ちゃ':'tya','ちゅ':'tyu','ちょ':'tyo','にゃ':'nya','にゅ':'nyu','にょ':'nyo','ひゃ':'hya','ひゅ':'hyu','ひょ':'hyo','みゃ':'mya','みゅ':'myu','みょ':'myo','りゃ':'rya','りゅ':'ryu','りょ':'ryo','ぎゃ':'gya','ぎゅ':'gyu','ぎょ':'gyo','じゃ':'zya','じゅ':'zyu','じょ':'zyo','びゃ':'bya','びゅ':'byu','びょ':'byo','ぴゃ':'pya','ぴゅ':'pyu','ぴょ':'pyo','しぇ':'sye','ん':'n'
        };

        function toRoma(kana) {
            let roma = ""; let i = 0;
            while (i < kana.length) {
                let char2 = kana.substring(i, i + 2); let char1 = kana.substring(i, i + 1);
                if (kanaMap[char2]) { roma += kanaMap[char2]; i += 2; }
                else if (kanaMap[char1]) { roma += kanaMap[char1]; i += 1; }
                else if (char1 === 'っ') { i += 1; let nextRoma = toRoma(kana.substring(i, i + 1)); if (nextRoma) roma += nextRoma[0]; }
                else { roma += char1; i += 1; }
            }
            return roma;
        }

        let isAudioEnabled = true, shuffledList = [], currentQ = null, charIndex = 0, solvedCount = 0, totalInCourse = 0, isStarted = false, lastCourseType = 0;
        const inputElement = document.getElementById("hidden-input"), romaDisplay = document.getElementById("roma-display"), questionBox = document.getElementById("question-box"), resultScreen = document.getElementById("result-screen");

        function selectCourse(type) {
            lastCourseType = type; solvedCount = 0; resultScreen.style.display = "none";
            document.querySelectorAll('.course-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-course-${type}`).classList.add('active');
            if(type === 2) shuffledList = aiuData.map(k => ({ k: k, r: toRoma(k) })).sort(() => Math.random() - 0.5);
            else shuffledList = rawData.filter(d => d[type] !== "").map(d => ({ k: d[type], r: toRoma(d[type]) })).sort(() => Math.random() - 0.5);
            totalInCourse = shuffledList.length; document.getElementById("total-count").innerText = totalInCourse;
            updateProgress(); isStarted = true; nextQuestion();
        }

        function nextQuestion() {
            if (shuffledList.length === 0) {
                document.getElementById("result-text").innerText = `全 ${totalInCourse} 問を完了しました！`;
                resultScreen.style.display = "flex"; isStarted = false; return;
            }
            currentQ = shuffledList.pop(); charIndex = 0; updateDisplay();
            if (isAudioEnabled) { speechSynthesis.cancel(); let uttr = new SpeechSynthesisUtterance(currentQ.k); uttr.lang = 'ja-JP'; speechSynthesis.speak(uttr); }
            focusInput();
        }

        function updateProgress() { document.getElementById("current-count").innerText = solvedCount; }

        function updateDisplay() {
            document.getElementById("sub-display").innerText = currentQ.k;
            let html = "";
            for (let i = 0; i < currentQ.r.length; i++) {
                if (i < charIndex) html += `<span style="color:#dcdde1">${currentQ.r[i]}</span>`;
                else if (i === charIndex) html += `<span style="color:#e67e22; border-bottom:3px solid #e67e22">${currentQ.r[i]}</span>`;
                else html += `<span>${currentQ.r[i]}</span>`;
            }
            romaDisplay.innerHTML = html; updateVisualAids();
        }

        function updateVisualAids() {
            document.querySelectorAll('.key-btn').forEach(b => b.classList.remove('highlight-key'));
            document.querySelectorAll('.finger-dot').forEach(d => d.classList.remove('active'));
            if(!currentQ) return;
            const targetChar = currentQ.r[charIndex];
            const targetBtn = document.querySelector(`.key-btn[data-key="${targetChar}"]`);
            if (targetBtn) {
                targetBtn.classList.add('highlight-key');
                const fingerMap = {'q':'L5','a':'L5','z':'L5','w':'L4','s':'L4','x':'L4','e':'L3','d':'L3','c':'L3','r':'L2','f':'L2','v':'L2','t':'L2','g':'L2','b':'L2','y':'R2','h':'R2','n':'R2','u':'R2','j':'R2','m':'R2','i':'R3','k':'R3','o':'R4','l':'R4','p':'R5'};
                const finger = fingerMap[targetChar]; if(finger) document.getElementById(`dot-${finger}`).classList.add('active');
            }
        }

        function backToMenu() {
            isStarted = false; currentQ = null; resultScreen.style.display = "none";
            document.querySelectorAll('.course-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById("sub-display").innerText = "コースを選んでスタート";
            romaDisplay.innerHTML = ""; document.getElementById("current-count").innerText = "0";
            document.getElementById("total-count").innerText = "0";
            document.querySelectorAll('.key-btn').forEach(b => b.classList.remove('highlight-key'));
            document.querySelectorAll('.finger-dot').forEach(d => d.classList.remove('active'));
        }

        function triggerOkEffect() { const el = document.createElement('div'); el.className = 'ok-effect'; el.innerText = 'OK!'; questionBox.appendChild(el); setTimeout(() => el.remove(), 500); }

        inputElement.addEventListener("input", (e) => {
            if (!isStarted || !e.target.value) return;
            const typed = e.target.value.toLowerCase(); const target = currentQ.r[charIndex];
            if (typed.endsWith(target)) {
                charIndex++; updateDisplay();
                if (charIndex === currentQ.r.length) { solvedCount++; updateProgress(); triggerOkEffect(); setTimeout(nextQuestion, 300); }
            }
            e.target.value = "";
        });

        function resetGame() { selectCourse(lastCourseType); }
        function focusInput() { if (isStarted) inputElement.focus(); }
        function toggleAudio() { isAudioEnabled = !isAudioEnabled; document.getElementById("audio-text").innerText = isAudioEnabled ? "ON" : "OFF"; }
    </script>
</body>
</html>
